<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>활동 기록 관리 | 동아리 ON</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="site-header">
    <a href="./index.html" class="logo">동아리 ON</a>
    <nav>
      <a href="./index.html">홈</a>
      <a href="./club-list.html">동아리 탐색</a>
      <a href="./apply.html">동아리 지원</a>
      <a href="./mypage.html">마이페이지</a>
    </nav>
  </header>

  <main class="operator-page">
    <section class="operator-hero">
      <p class="eyebrow">활동 기록</p>
      <h1>활동 기록 목록 / 상세 / 작성 / 수정 / 삭제</h1>
      <p>동아리 활동 사진과 내용을 기록하고 관리합니다. 이미지 URL은 줄바꿈으로 여러 개 입력할 수 있습니다.</p>
    </section>

    <section class="operator-panel">
      <div class="operator-toolbar">
        <label class="operator-field">
          <span>동아리 선택</span>
          <select id="recordClubSelect">
            <option value="">동아리를 선택하세요</option>
          </select>
        </label>
        <button type="button" id="loadRecordsBtn" class="operator-btn primary">목록 조회</button>
      </div>

      <section class="activity-info-editor">
        <div class="operator-section-head">
          <div>
            <h2>주요 활동 / 연간 활동 정보</h2>
            <p>동아리 상세 페이지의 활동 탭에 표시되는 정보를 직접 수정합니다.</p>
          </div>
        </div>
        <form id="clubActivityInfoForm" class="post-form activity-info-form">
          <label>
            <span>주요 활동</span>
            <textarea id="majorActivitiesInput" rows="5" placeholder="정기 스터디 및 세미나&#10;팀 프로젝트 활동&#10;해커톤 참여"></textarea>
          </label>
          <label>
            <span>연간 활동 정보</span>
            <textarea id="annualActivitiesInput" rows="5" placeholder="7~8월 | 아기사자 모집&#10;9월 | 스터디 & 팀 프로젝트&#10;10월 | 공모전"></textarea>
          </label>
          <button type="submit" class="operator-btn primary">활동 정보 저장</button>
        </form>
      </section>

      <div class="record-layout">
        <section class="record-list-area">
          <div id="recordSummary" class="operator-summary">동아리를 선택하면 활동 기록 목록이 표시됩니다.</div>
          <div id="recordList" class="record-list"></div>
        </section>

        <section class="record-form-area">
          <h2 id="recordFormTitle">활동 기록 작성</h2>
          <form id="recordForm" class="post-form">
            <input type="hidden" id="recordId" />

            <label>
              <span>제목</span>
              <input type="text" id="recordTitle" placeholder="활동 기록 제목" required />
            </label>

            <label>
              <span>내용</span>
              <textarea id="recordContent" rows="8" placeholder="활동 내용을 입력하세요." required></textarea>
            </label>

            <label>
              <span>이미지 파일 (JPG, PNG, WebP / 최대 5개)</span>
              <input type="file" id="recordImageFiles" accept="image/jpeg,image/png,image/webp" multiple />
            </label>

            <div class="operator-form-actions compact">
              <button type="submit" class="operator-btn primary full">저장</button>
              <button type="button" id="resetRecordFormBtn" class="operator-btn">새 글 작성</button>
            </div>
          </form>
        </section>
      </div>

      <section id="recordDetail" class="post-detail hidden"></section>
    </section>
  </main>

  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/activity-records.js"></script>
</body>
</html>
