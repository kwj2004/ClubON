<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시판 관리 | 동아리 ON</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="site-header">
    <a href="./index.html" class="logo-wrap" aria-label="동아리 ON 홈">
      <img src="./images/eulji-emblem.svg" alt="을지대학교 엠블럼" class="header-emblem" />
      <span>동아리 ON</span>
    </a>

    <nav class="gnb" aria-label="주요 메뉴">
      <a href="./index.html">홈</a>
      <a href="./club-list.html">동아리 탐색</a>
      <a href="./apply.html">동아리 지원</a>
      <a href="./mypage.html">마이페이지</a>
    </nav>
  </header>

  <main class="operator-api-page">
    <section class="operator-api-hero">
      <p class="eyebrow">게시판</p>
      <h1>게시판 목록 / 작성 / 조회수</h1>
      <p>동아리별 게시글을 조회하고 새 게시글을 작성할 수 있습니다.</p>
    </section>

    <section class="operator-api-panel">
      <div class="operator-api-toolbar board-api-toolbar">
        <label class="operator-api-field">
          <span>동아리 선택</span>
          <select id="boardClubSelect">
            <option value="">동아리를 선택하세요</option>
          </select>
        </label>

        <label class="operator-api-field">
          <span>카테고리</span>
          <select id="boardCategoryFilter">
            <option value="">전체</option>
            <option value="NOTICE">공지</option>
            <option value="RESOURCE">자료</option>
            <option value="QUESTION">질문</option>
          </select>
        </label>

        <label class="operator-api-field keyword-field">
          <span>검색어</span>
          <input type="text" id="boardKeyword" placeholder="제목/내용 검색" />
        </label>

        <button type="button" id="loadPostsBtn" class="operator-api-btn primary">
          조회
        </button>
      </div>

      <div class="board-api-layout">
        <section class="board-api-list-area">
          <div id="boardSummary" class="operator-api-summary">
            동아리를 선택하면 게시글 목록이 표시됩니다.
          </div>
          <div id="postList" class="post-api-list"></div>
        </section>

        <section class="board-api-write-area">
          <h2>게시글 작성</h2>

          <form id="postForm" class="post-api-form">
            <label>
              <span>카테고리</span>
              <select id="postCategory" required>
                <option value="NOTICE">공지</option>
                <option value="RESOURCE">자료</option>
                <option value="QUESTION">질문</option>
              </select>
            </label>

            <label>
              <span>제목</span>
              <input type="text" id="postTitle" placeholder="게시글 제목" required />
            </label>

            <label>
              <span>내용</span>
              <textarea id="postContent" rows="8" placeholder="게시글 내용을 입력하세요." required></textarea>
            </label>

            <button type="submit" class="operator-api-btn primary full">
              게시글 등록
            </button>
          </form>
        </section>
      </div>

      <section id="postDetail" class="post-api-detail hidden"></section>
    </section>
  </main>

<footer class="site-footer">
    <div class="footer-brand">
      <img src="./images/eulji-logo-ko.svg" alt="을지대학교 로고" />
      <h2>동아리 ON</h2>
      <p>© 2026 EULJI UNIVERSITY. <span>All rights reserved.</span></p>
    </div>

    <div class="footer-menu">
      <ul>
        <li><a href="./club-list.html">동아리 탐색</a></li>
        <li><a href="./apply.html">동아리 지원</a></li>
        <li><a href="./mypage.html">마이페이지</a></li>
        <li><a href="./login.html">로그인 / 회원가입</a></li>
      </ul>
      <ul>
        <li><a href="./guide.html">이용 안내</a></li>
        <li><a href="./inquiry.html">문의</a></li>
      </ul>
    </div>
  </footer>

  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/board.js"></script>
</body>
</html>
