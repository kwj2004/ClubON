<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지원자 목록 | 동아리 ON</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="site-header">
    <a href="./index.html" class="logo-wrap" aria-label="동아리 ON 홈">
      <img src="./images/eulji-emblem.svg" alt="을지대학교 엠블럼" class="header-emblem" />
      <span>동아리 ON</span>
    </a>

    <nav class="gnb" aria-label="주요 메뉴">
      <a href="./index.html">홈</a>
      <a href="./club-list.html">동아리 탐색</a>
      <a href="./apply.html">동아리 지원</a>
      <a href="./mypage.html">마이페이지</a>
    </nav>
  </header>

  <main class="operator-api-page">
    <section class="operator-api-hero">
      <p class="eyebrow">운영진 관리</p>
      <h1>지원자 목록 조회</h1>
      <p>운영 중인 동아리에 지원한 학생 목록을 확인하고 승인/거절 처리할 수 있습니다.</p>
    </section>

    <section class="operator-api-panel">
      <div class="operator-api-toolbar">
        <label class="operator-api-field">
          <span>동아리 선택</span>
          <select id="clubSelect">
            <option value="">동아리를 선택하세요</option>
          </select>
        </label>

        <label class="operator-api-field">
          <span>지원 상태</span>
          <select id="statusSelect">
            <option value="PENDING">대기</option>
            <option value="APPROVED">승인</option>
            <option value="REJECTED">거절</option>
            <option value="">전체</option>
          </select>
        </label>

        <button type="button" id="loadApplicationsBtn" class="operator-api-btn primary">
          조회하기
        </button>
      </div>

      <div id="applicationSummary" class="operator-api-summary">
        동아리를 선택하면 지원자 목록이 표시됩니다.
      </div>

      <div id="applicationsList" class="application-api-list"></div>
    </section>
  </main>

<footer class="site-footer">
    <div class="footer-brand">
      <img src="./images/eulji-logo-ko.svg" alt="을지대학교 로고" />
      <h2>동아리 ON</h2>
      <p>© 2026 EULJI UNIVERSITY. <span>All rights reserved.</span></p>
    </div>

    <div class="footer-menu">
      <ul>
        <li><a href="./club-list.html">동아리 탐색</a></li>
        <li><a href="./apply.html">동아리 지원</a></li>
        <li><a href="./mypage.html">마이페이지</a></li>
        <li><a href="./login.html">로그인 / 회원가입</a></li>
      </ul>
      <ul>
        <li><a href="./guide.html">이용 안내</a></li>
        <li><a href="./inquiry.html">문의</a></li>
      </ul>
    </div>
  </footer>

  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/operator-applications.js"></script>
</body>
</html>
