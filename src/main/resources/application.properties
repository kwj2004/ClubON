spring.application.name=ClubON

spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/clubon?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:clubon-local-development-secret-key-must-be-at-least-32-bytes}
jwt.expiration=3600000
auth.refresh-token.expiration=2592000000
auth.password-reset.code-expiration=300000
auth.password-reset.token-expiration=600000

aws.region=${AWS_REGION:ap-northeast-2}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.s3.upload-url-expiration=300
aws.s3.download-url-expiration=900

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
clubon.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
